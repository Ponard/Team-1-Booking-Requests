name: Deploy Flutter Web

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get
        working-directory: frontend

      - name: Build web
        run: |
          flutter build web \
            --release \
            --base-href "/Team-1-Booking-Requests/" \
            --dart-define=API_BASE_URL="https://backend--rcdok-booking-requests--dyznz2dj8kbb.code.run"
        working-directory: frontend

      - name: Deploy to web-deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: web-deploy
          publish_dir: frontend/build/web
          force_orphan: true
